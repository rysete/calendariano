name: Update ICS

on:
  workflow_dispatch:  # botão manual
  push:
    paths:
      - 'backend/calendars/**'
      - 'script_gera_ics.py'
  schedule:
    - cron: "0 3 1 * *" # roda todo dia 1 às 03:00

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Generate ICS
        run: |
          mkdir -p docs
          python script_gera_ics.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          # Verifica se existem arquivos .ics antes de tentar adicionar
          if ls docs/*.ics 1> /dev/null 2>&1; then
            git add docs/*.ics
            
            if git diff --cached --quiet; then
              echo "No changes in ICS files"
            else
              git commit -m "update calendario.ics [skip ci]"
              git push
            fi
          else
            echo "No ICS files generated to commit"
          fi
